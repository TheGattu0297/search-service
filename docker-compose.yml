version: "3.8"

services:
  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: elasticsearch_product
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_product_data:/var/lib/elasticsearch/data
  kibana:
    image: kibana:8.12.2
    container_name: kibana_product
    ports:
      - "5601:5601"

volumes:
  elasticsearch_product_data: